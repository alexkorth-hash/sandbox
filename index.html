  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0604; font-family: 'Courier New', 'Menlo', monospace; }

  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at center, #1a0f08 0%, #0a0604 100%);
  }

  #cabinet {
    position: relative;
    width: 100%; max-width: 430px; height: 670px; max-height: 670px;
    display: flex; flex-direction: column;
    background-color: #0a0604;
    box-shadow:
      0 0 80px rgba(255,140,40,0.08);
  }

  #logo-area {
    flex: 0 0 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 0;
    width: 373px;
    max-width: 100%;
    margin: 0 auto;
    background: transparent;
  }
  .score-panel {
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
    background: #0a0a0a;
    border-radius: 8px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 4px 6px;
    box-sizing: border-box;
  }
  .score-panel::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #FFCE00;
    border-radius: 6px;
    pointer-events: none;
  }
  .score-label {
    color: #fff;
    font-family: 'Sohne Schmal', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.05em;
    line-height: 1;
    z-index: 1;
  }
  .score-value {
    position: relative;
    color: #FFCE00;
    font-family: 'DSEG7', 'Sohne Schmal', monospace;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    z-index: 1;
    font-variant-numeric: tabular-nums;
    text-shadow:
      0 0 4px rgba(255, 206, 0, 0.85),
      0 0 8px rgba(255, 206, 0, 0.45);
    display: inline-block;
  }
  /* Dim "ghost" digits behind the live value to fake unlit LED segments. */
  .score-value::before {
    content: attr(data-ghost);
    position: absolute;
    inset: 0;
    color: rgba(255, 206, 0, 0.12);
    text-shadow: none;
    z-index: -1;
    pointer-events: none;
  }
  .score-balls {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .score-ball {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid #FFCE00;
    box-sizing: border-box;
  }
  .score-ball.filled {
    background: #FFCE00;
  }

  #playfield-wrap {
    flex: 0 0 500px;
    position: relative;
    margin: 0;
    background: transparent;
    overflow: hidden;
  }

  canvas { display: block; width: 100%; height: 100%; }

  /* The bottom panel holds both the START button and the joystick
     controls. Grows to fill the remaining vertical space below the
     playfield. The controls + start button are always vertically
     centered within this area, regardless of how tall it is. */
  #bottom-panel {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    background: transparent;
  }

  /* Inner row containing the two joysticks with START in the middle.
     Width = wood width so joysticks line up with the wood's edges. */
  #controls {
    width: 373px;
    max-width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  /* START button is positioned absolutely in the horizontal center of the
     controls row, vertically centered between the two joystick wells. */
  #start-area {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* Slot — narrow vertical opening that the shaft passes through. Sized
     smaller than the ball so the ball covers it when centered. The slot's
     length is just enough to allow shaft motion at maximum joystick offset
     — it doesn't peek past the ball when centered. */
  .stick-slot {
    position: absolute;
    left: 50%; top: 50%;
    width: 17px; height: 42px;
    transform: translate(-50%, -50%);
    background: #1a1a1a;
    border-radius: 12px;
    /* Inner shadows — asymmetric, bigger at the bottom-left for a recessed
       cavity look. Plus an outer soft dark halo so the slot's edge fades
       gradually into the surrounding well rather than meeting it sharply. */
    box-shadow:
      /* Inner: bottom-left deeper shadow */
      inset -3px -6px 12px rgba(0,0,0,0.9),
      inset -1px -3px 6px rgba(0,0,0,0.7),
      /* Inner: faint top-right highlight */
      inset 1px 2px 3px rgba(255,255,255,0.04),
      /* Outer: soft dark halo around the slot */
      0 0 6px 2px rgba(0,0,0,0.7),
      0 0 12px 4px rgba(0,0,0,0.45);
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
  }
  /* The shaft inside the slot — moves vertically with the joystick.
     Hidden behind the ball when centered, revealed when ball moves. */
  .stick-shaft {
    position: absolute;
    left: 50%; top: 50%;
    width: 14px; height: 200%;
    transform: translate(-50%, -50%);
    background:
      linear-gradient(180deg,
        #1a1a1a 0%, #000 50%, #1a1a1a 100%);
    will-change: transform;
  }
  .stick-label {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, calc(-50% + 60px));
    font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
    color: #ffb56b; opacity: 0.6;
    pointer-events: none;
    white-space: nowrap;
    z-index: 3;
  }

     drop shadow to sell the "ball resting in well" effect. */

    content: '';
    position: absolute;
    left: 15%; top: 15%;
    width: 70%; height: 70%;
    border-radius: 50%;
    box-shadow: none;
    pointer-events: none;
    transition: box-shadow 0.08s ease;

      inset 0 2px 4px rgba(0,0,0,0.55),
      inset 0 1px 2px rgba(0,0,0,0.4);

  }

    font-family: 'Sohne Schmal', 'Courier New', sans-serif;

<body>
<div id="wrap">
  <div id="cabinet">
    <div id="logo-area">
      <div class="score-panel">
        <div class="score-label">BALLS</div>
        <div class="score-balls">
          <div class="score-ball filled" id="ball0"></div>
          <div class="score-ball filled" id="ball1"></div>
          <div class="score-ball filled" id="ball2"></div>
        </div>
      </div>
      <div class="score-panel">
        <div class="score-label">BONUS</div>
        <div class="score-value" id="bonus-value">100</div>
      </div>
      <div class="score-panel">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="score-value">0</div>
      </div>
    </div>
    <div id="playfield-wrap">
      <canvas id="game"></canvas>
    </div>
    <div id="bottom-panel">
      <div id="controls">
        <div class="stick" id="leftStick">
          <div class="stick-slot"><div class="stick-shaft"></div></div>
          <div class="stick-cap"></div>
        </div>
        <div id="start-area">
          <button id="start-btn" class="arcade-btn"><span class="btn-glow"></span></button>
          <div class="start-label">START</div>
        </div>
        <div class="stick" id="rightStick">
          <div class="stick-slot"><div class="stick-shaft"></div></div>
          <div class="stick-cap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  // ---------- iOS zoom prevention ----------
  // Safari ignores user-scalable=no for accessibility. We block the gestures
  // manually so two-finger touches (one on each joystick) don't trigger
  // pinch-to-zoom, and rapid taps on the START button don't double-tap zoom.
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('gestureend', (e) => e.preventDefault());
  // Block multi-touch from triggering zoom.
  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // Block double-tap zoom by cancelling touchend if it follows another within 300ms.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd < 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('playfield-wrap');

  const startArea = document.getElementById('start-area');
  const startBtn  = document.getElementById('start-btn');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const r = wrap.getBoundingClientRect();
    const newW = r.width;
    const newH = r.height;
    // If we previously had no valid layout but now do, regenerate holes
    // (boot can race with iframe layout, causing initial zero size).
    const wasZero = (W <= 0 || H <= 0);
    W = newW; H = newH;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (wasZero && W > 0 && H > 0 && G.holes.length === 0) {
      generateHoles();
      G.targetIdx = pickTargetForLevel(G.level);
      const woodY = 0;  // wood anchored to top of canvas
      G.barMinY = woodY;

  const WOOD_W = 373;
  const WOOD_H = 500;

  function generateHoles() {
    G.holes = [];
    if (W <= 0 || H <= 0) return;
    // Wood is anchored to the top of the canvas (not centered) so the top
    // row of holes is always visible regardless of canvas height.
    const woodX = (W - WOOD_W) / 2;
    const woodY = 0;
    // Per-type counter so each type numbers from 1 (e.g. large 1-23, medium 1-49).
    const typeCounts = {};
    // All hole coordinates are inset 10px from where they're authored, so
    // x/y measured to the edge of the wood become x+10/y+10 in canvas space.
    const COORD_OFFSET = 10;
    for (const h of HOLE_LAYOUT) {
      typeCounts[h.type] = (typeCounts[h.type] || 0) + 1;
      G.holes.push({
        x: woodX + h.x + COORD_OFFSET,
        y: woodY + h.y + COORD_OFFSET,
        type: h.type,
        typeIndex: typeCounts[h.type],
        radius: HOLE_SIZES[h.type] / 2,
      });
    }
  }

  function pickTargetForLevel(level) {
    if (G.holes.length === 0) return 0;
    // The target is always the score hole numbered `level` (1-10).
    // Score holes have type === 'score' and a typeIndex from 1 to 10.
    for (let i = 0; i < G.holes.length; i++) {
      const h = G.holes[i];
      if (h.type === 'score' && h.typeIndex === level) return i;
    }
    // Fallback: shouldn't happen if there are 10 score holes.
    return 0;
  }

    left:  { el: document.getElementById('leftStick'),  cap: null, shaft: null, pid: null, val: 0 },

  sticks.left.shaft  = sticks.left.el.querySelector('.stick-shaft');

  const STICK_MAX_OFFSET = 20;
  const STICK_DEADZONE = 0.12;
  const STICK_SPRING_MS = 110;

  function setCapTransform(stick, dx, dy, animate) {
    const transition = animate
      ? `transform ${STICK_SPRING_MS}ms cubic-bezier(.5,1.6,.4,1)`
      : 'none';
    stick.cap.style.transition = transition;
    stick.cap.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    // Move the shaft inside the slot to match the ball's vertical position.
    if (stick.shaft) {
      stick.shaft.style.transition = transition;
      stick.shaft.style.transform = `translate(-50%, calc(-50% + ${dy}px))`;
    }
  }

  function updateStickFromPointer(stick, clientX, clientY) {
    const r = stick.el.getBoundingClientRect();
    const cy = r.top  + r.height / 2;
    let dy = clientY - cy;
    // Vertical-only motion — the slot in the base constrains the joystick
    // to up/down, just like a real arcade stick with a slotted gate.
    if (dy > STICK_MAX_OFFSET) dy = STICK_MAX_OFFSET;
    else if (dy < -STICK_MAX_OFFSET) dy = -STICK_MAX_OFFSET;
    setCapTransform(stick, 0, dy, false);
    let v = dy / STICK_MAX_OFFSET;
    if (Math.abs(v) < STICK_DEADZONE) v = 0;
    else v = Math.sign(v) * (Math.abs(v) - STICK_DEADZONE) / (1 - STICK_DEADZONE);
    // Apply exponential curve — small deflections give small bar speeds,
    // only full deflection gives full speed. This makes fine control much
    // easier when the toggle is barely tapped.
    v = Math.sign(v) * Math.pow(Math.abs(v), 2.2);
    stick.val = Math.max(-1, Math.min(1, v));
  }

  function releaseStick(stick) {
    stick.pid = null;
    stick.val = 0;
    stick.el.classList.remove('active');
    setCapTransform(stick, 0, 0, true);

  function bindStick(side) {
    const stick = sticks[side];
    stick.el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      stick.pid = e.pointerId;
      stick.el.setPointerCapture(e.pointerId);
      stick.el.classList.add('active');
      updateStickFromPointer(stick, e.clientX, e.clientY);
    });
    stick.el.addEventListener('pointermove', (e) => {
      if (stick.pid !== e.pointerId) return;
      updateStickFromPointer(stick, e.clientX, e.clientY);
    });
    const end = (e) => {
      if (stick.pid !== e.pointerId) return;
      releaseStick(stick);
    };
    stick.el.addEventListener('pointerup', end);
    stick.el.addEventListener('pointercancel', end);
    stick.el.addEventListener('lostpointercapture', end);
  }

  bindStick('right');

    keysHeld[side] = v;
    sticks[side].val = v;

    setCapTransform(sticks[side], 0, v * STICK_MAX_OFFSET, v === 0);

    if (e.key === 'ArrowUp')             applyKeyVal('right', -1);
    if (e.key === 'ArrowDown')           applyKeyVal('right', +1);

    if (e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S') applyKeyVal('left',  0);

  // ---------- Physics constants ----------
  // Note: the real arcade bar moves at ~2.5 in/sec — glacial. On a small
  // touchscreen that feels broken, so we run faster for responsiveness.
  const BAR_TARGET_SPEED = 280;  // px/s at full stick deflection
  const BAR_RAMP_ACCEL   = 4200; // px/s² accelerating to track the stick
  const BAR_STOP_ACCEL   = 5200; // px/s² braking when stick is centered
  const BAR_MAX_VY       = 520;  // hard velocity cap

  const BALL_GRAVITY  = 1300;
  const BALL_FRICTION = 0.995;
  const BALL_BOUNCE   = 0.40;

  // ---------- Loop ----------
  let lastT = 0;
  function tick(ts) {
    if (!lastT) lastT = ts;
    let dt = Math.min(0.033, (ts - lastT) / 1000);
    lastT = ts;

    // If layout wasn't valid at boot, keep trying until we have dimensions.
    if (W <= 0 || H <= 0 || G.holes.length === 0) {
      resize();
      requestAnimationFrame(tick);
      return;
    }

    if (G.state === 'play')    stepPlay(dt);
    if (G.state === 'falling') stepFalling(dt);

    // Bonus ticks down by 10 every second during play.
    if (G.state === 'play' && !G.tickerActive) {
      G.bonusTimer += dt;
      while (G.bonusTimer >= 1) {
        G.bonusTimer -= 1;
        if (G.bonus > 0) G.bonus -= 10;
        if (G.bonus < 0) G.bonus = 0;
      }
      // Keep display in sync with live bonus when not in ticker animation.
      G.displayBonus = G.bonus;
      G.displayScore = G.score;
    }

    // Ticker animation — bonus rolls down to 0, score rolls up to score+bonus.
    if (G.tickerActive) {
      // Speed: drains the bonus over ~1.2 seconds, regardless of size.
      const drainPerSecond = G.tickerStart / 1.2;
      const drainThisFrame = Math.max(1, drainPerSecond * dt);
      if (G.displayBonus > 0) {
        const drained = Math.min(G.displayBonus, drainThisFrame);
        G.displayBonus -= drained;
        G.displayScore += drained;
      }
      // Snap to final values once close enough.
      if (G.displayBonus <= 0.5) {
        G.displayBonus = 0;
        G.displayScore = G.score;
        G.tickerActive = false;
        // Now reset bonus to next level's starting value.
        G.bonus = Math.min(1000, G.level * 100);
        G.displayBonus = G.bonus;
        G.bonusTimer = 0;
      }
    }

    // If holes weren't generated yet (very early boot frame), skip drawing.
    if (G.holes.length === 0) {
      requestAnimationFrame(tick);
      return;
    }

    draw();
    requestAnimationFrame(tick);
  }

  function stepPlay(dt) {
    const updateEnd = (stickVal, y, vy) => {
      const targetVy = stickVal * BAR_TARGET_SPEED;
      const accel = (stickVal === 0) ? BAR_STOP_ACCEL : BAR_RAMP_ACCEL;
      const dv = targetVy - vy;
      const step = accel * dt;
      if (Math.abs(dv) <= step) vy = targetVy;
      else                      vy += Math.sign(dv) * step;
      vy = Math.max(-BAR_MAX_VY, Math.min(BAR_MAX_VY, vy));
      y += vy * dt;
      if (y < G.barMinY) { y = G.barMinY; vy = 0; }
      if (y > G.barMaxY) { y = G.barMaxY; vy = 0; }
      return [y, vy];
    };
    let [ly, lvy] = updateEnd(sticks.left.val,  G.leftY,  G.leftVy);
    let [ry, rvy] = updateEnd(sticks.right.val, G.rightY, G.rightVy);
    G.leftY = ly; G.leftVy = lvy;
    G.rightY = ry; G.rightVy = rvy;

    const woodLeft = (W - WOOD_W) / 2;
    const woodRight = woodLeft + WOOD_W;
    // Brackets land 10px from the wood edges. Brackets are inset 8px along
    // the rod from lx/rx, so lx = woodLeft + 10 - 8 = woodLeft + 2.
    const lx = woodLeft + 2, rx = woodRight - 2;
    const dx = rx - lx;
    const dy = G.rightY - G.leftY;
    const barLen = Math.hypot(dx, dy);
    const sinTheta = dy / barLen;

    const accel = BALL_GRAVITY * sinTheta;
    G.ballVx += accel * dt;
    G.ballVx *= Math.pow(BALL_FRICTION, dt * 60);
    G.ballX  += G.ballVx * dt;

    // Ball bounces off the inner edge of each post. The post is drawn 8px
    // inset along the rod direction. The ball physics treats ballX as a
    // horizontal coordinate, so we convert the along-rod inset into a
    // horizontal-distance equivalent: along-rod distance × cos(angle) =
    // ux × distance, where ux = (rx-lx)/rodLen.
    //
    // Total horizontal distance the ball center must keep away from each
    // bar end = (POST_INSET + pegRadius + ballRadius) along the rod, but
    // for the ball-radius part, the ball is a sphere whose center stays on
    // the rod axis, so it's all measured along the rod.
    const POST_INSET = 8;
    const rodLen = Math.hypot(rx - lx, G.rightY - G.leftY);
    const horizontalProjection = (rx - lx) / rodLen;
    const insetX = (POST_INSET + G.pegRadius + G.ballRadius) * horizontalProjection;
    const minX = lx + insetX;
    const maxX = rx - insetX;
    if (G.ballX < minX) { G.ballX = minX; G.ballVx = -G.ballVx * BALL_BOUNCE; }
    if (G.ballX > maxX) { G.ballX = maxX; G.ballVx = -G.ballVx * BALL_BOUNCE; }

    const t = (G.ballX - lx) / dx;
    // Bar surface y at the ball's x — this is the TOP of the rod where the
    // ball makes contact (we model the rod as a thin cylinder; barThickness
    // is its diameter, so its top is barCenterY - barThickness/2).
    const barCenterY = G.leftY + t * dy;
    const barTopY    = barCenterY - G.barThickness / 2;
    // The ball's CENTER y when resting on the bar.
    const ballCenterY = barTopY - G.ballRadius;

    // ---- Hole detection — physical model ----
    //
    // PHYSICAL SETUP: The playfield is a flat surface with circular holes
    // cut into it. The rod sits in a slot, passing behind the playfield
    // through the holes. The ball rests ON TOP of the rod.
    //
    // For the ball to fall into a hole, two things must be true:
    //
    //   (A) The rod AT THE HOLE'S X must be at or below the hole's y, so
    //       there's no rod blocking the hole opening. Critically this is
    //       the rod height AT THE HOLE — not at the ball — because a
    //       tilted rod can be below the hole at one x and above it at
    //       another. Only the rod-at-hole-x matters for whether the
    //       hole is "open" to receive the ball.
    //
    //   (B) The ball must be FULLY OVER THE HOLE. Strict containment:
    //       the ball's entire silhouette must be within the hole's
    //       opening, i.e. distance between centers < (holeR - ballR).
    //       If any part of the ball overhangs the rim, the rim
    //       supports it and the ball doesn't fall. This is what
    //       "the hole covers the mass of the ball" means.
    //
    // GAME-START GUARD: the bar parks at the bottom at reset, below all
    // holes — so condition (A) is trivially true. We use the "armed"
    // mechanism: a hole arms only after the bar at that hole's x has
    // been clearly above the hole during this life. Disarmed at reset.

    // ---- Capture: ball-fits-inside-hole geometry ----
    //
    // From the diagram: the bar cuts a chord across the hole. The "remaining
    // circumference" — the white area above the bar — is what's left of the
    // hole opening. The ball drops in when its full silhouette fits inside
    // this remaining area.
    //
    // The ball is sitting on top of the bar with its center at:
    //   ballCenterY = barTopY - ballR
    //   ballCenterX = ballX
    //
    // The "remaining area" is the circular segment of the hole that's above
    // the bar's top edge. The ball's circle (radius ballR) fits inside this
    // segment if and only if the ball's circle is fully inside the hole's
    // circle:
    //         distance(ballCenter, holeCenter) <= holeR - ballR
    //
    // When yes, the ball fits within the remaining area shown in the
    // diagram and falls in.
    // Swept capture detection: the capture zone is small, so a fast-moving
    // ball can skip past it in a single frame. We sample the ball's path
    // from its previous position to current and check each sample against
    // all holes. Each hole has its own radius (set per hole type).
    const sweepDx = G.ballX - G.prevBallX;
    const sweepDy = barCenterY - G.prevBallSurfY;
    const sweepDist = Math.hypot(sweepDx, sweepDy);
    // Use enough substeps so each step is at most 1px (smaller than capture zone).
    const sweepSteps = Math.max(1, Math.ceil(sweepDist));

    let hitIdx = -1;
    let hitDist2 = Infinity;
    let hitBallX = G.ballX;

    for (let s = 1; s <= sweepSteps; s++) {
      const u = s / sweepSteps;
      const sweptBallX = G.prevBallX + sweepDx * u;
      const sweptSurfY = G.prevBallSurfY + sweepDy * u;
      const sweptBallCenterY = (sweptSurfY - G.barThickness / 2) - G.ballRadius;

      for (let i = 0; i < G.holes.length; i++) {
        const h = G.holes[i];
        // Capture when the ball's center is close to the hole's center in
        // BOTH x and y. We use a circular zone — generous so capture feels
        // achievable, but tight enough that the ball doesn't drop into
        // every hole the bar passes by.
        let captureRadius;
        if (h.type === 'score') {
          captureRadius = 4;        // tighter for score (high-value)
        } else {
          // For large/medium holes, use a generous capture zone — the ball
          // center within (holeR - 2) of the hole center. This is more
          // forgiving than strict containment (holeR - ballR) but still
          // requires real alignment.
          captureRadius = h.radius - 2;
        }
        const captureRadius2 = captureRadius * captureRadius;
        const ddx = sweptBallX - h.x;
        const ddy = sweptBallCenterY - h.y;
        const d2 = ddx * ddx + ddy * ddy;
        if (d2 > captureRadius2) continue;
        if (d2 < hitDist2) {
          hitDist2 = d2;
          hitIdx = i;
          hitBallX = sweptBallX;
        }
      }
      // Stop scanning further once we've found a capture (we've passed
      // through the hole already and don't want to register a "later" one).
      if (hitIdx >= 0) break;
    }

    if (hitIdx >= 0) {
      const h = G.holes[hitIdx];
      G.ballX = h.x;
      G.ballVx = 0;
      G.fallIsTarget = (hitIdx === G.targetIdx);
      G.fallTimer    = 0;
      G.state        = 'falling';
    }

    G.prevBallX     = G.ballX;
    G.prevBallSurfY = barCenterY;
  }

  // Pickup animation state machine.
  //   'pause'   — 2-second pause where the bar stays in place (player sees
  //              what just happened before the bar starts moving)
  //   'descend' — bar levels itself and moves straight down past the wood
  //   'collect' — bar pauses below the wood, "picking up" the ball
  //   'rise'    — bar rises back up to its starting position
  const PICKUP_PAUSE_DURATION = 2.0;  // seconds before bar starts descending
  const PICKUP_DESCEND_SPEED = 220;   // px/s (slow, deliberate)
  const PICKUP_RISE_SPEED    = 220;   // px/s (also slow, no snap on the way up)
  const COLLECT_DURATION = 0.25;      // seconds paused below the wood

  function stepFalling(dt) {
    // Initialize pickup state on first frame after capture.
    if (!G.pickupPhase) {
      G.pickupPhase = 'pause';
      G.pickupPauseTimer = 0;
      G.pickupCollectTimer = 0;
    }

    // The bottom of the descend phase — bar moves below the visible playfield.
    const pickupBottomY = G.barPickupY;
    // Where the bar rises back to after pickup. Same y-position is also
    // the bar's starting position when a new game begins.
    const woodY = 0;  // wood anchored to top of canvas
    const startingY = woodY + 474;

    if (G.pickupPhase === 'pause') {
      G.pickupPauseTimer += dt;
      if (G.pickupPauseTimer >= PICKUP_PAUSE_DURATION) {
        G.pickupPhase = 'descend';
      }
      return;
    }

    if (G.pickupPhase === 'descend') {
      // Level the bar (both ends converge to the same y) while moving down.
      const levelStep = PICKUP_DESCEND_SPEED * dt;
      // Move both ends toward the average, then descend together.
      const avgY = (G.leftY + G.rightY) / 2;
      G.leftY  += Math.sign(avgY - G.leftY)  * Math.min(Math.abs(avgY - G.leftY),  levelStep * 2);
      G.rightY += Math.sign(avgY - G.rightY) * Math.min(Math.abs(avgY - G.rightY), levelStep * 2);
      // Then descend.
      const newAvg = (G.leftY + G.rightY) / 2;
      const descendStep = Math.min(pickupBottomY - newAvg, levelStep);
      if (descendStep > 0) {
        G.leftY  += descendStep;
        G.rightY += descendStep;
      }
      G.leftVy = 0; G.rightVy = 0;

      if (Math.abs(G.leftY - G.rightY) < 0.5 && G.leftY >= pickupBottomY - 0.5) {
        G.leftY = pickupBottomY;
        G.rightY = pickupBottomY;
        G.pickupPhase = 'collect';
        G.pickupCollectTimer = 0;
      }
      return;
    }

    if (G.pickupPhase === 'collect') {
      G.pickupCollectTimer += dt;
      if (G.pickupCollectTimer >= COLLECT_DURATION) {
        G.pickupPhase = 'rise';
        // Ball is now "loaded" onto the bar at center.
        G.ballX = W / 2;
        G.ballVx = 0;
        G.prevBallX = G.ballX;
        G.prevBallSurfY = G.leftY;
      }
      return;
    }

    if (G.pickupPhase === 'rise') {
      const riseStep = PICKUP_RISE_SPEED * dt;
      const newY = Math.max(startingY, G.leftY - riseStep);
      G.leftY  = newY;
      G.rightY = newY;
      if (newY <= startingY + 0.5) {
        G.leftY = startingY;
        G.rightY = startingY;
        // Animation complete — transition to next state.
        G.pickupPhase = null;
        finalizeFall();
      }
      return;
    }
  }

  function finalizeFall() {
    // Initial pickup at game start — just transition to play, don't
    // mutate score/lives.
    if (G.isInitialPickup) {
      G.isInitialPickup = false;
      G.ballX = W / 2;
      G.ballVx = 0;
      G.prevBallX = G.ballX;
      G.prevBallSurfY = G.leftY;
      G.fallTimer = 0;
      G.state = 'play';
      return;
    }
    if (G.fallIsTarget) {
      G.flash = 1; G.flashColor = '#ffd28a';
      // Bank the current bonus into the score. Trigger ticker animation.
      const bonusEarned = G.bonus;
      G.score += bonusEarned;
      G.tickerStart = bonusEarned;
      G.tickerActive = bonusEarned > 0;  // only animate if there's something to drain
      G.displayBonus = bonusEarned;       // start ticker from this value
      // displayScore stays where it was — the ticker increments it from there.
      G.level += 1;
      // 10 score holes total (numbered 1-10). Win when level passes 10.
      if (G.level > 10) {
        updateHud();
        G.state = 'gameover';
        return;
      }
      G.targetIdx = pickTargetForLevel(G.level);
      // Don't fully resetBar — that would jump the bar. Just reset ball.
      G.ballX = W / 2;
      G.ballVx = 0;
      G.prevBallX = G.ballX;
      G.prevBallSurfY = G.leftY;
      G.fallTimer = 0;
      // Note: G.bonus is reset to the next level's starting value AFTER the
      // ticker animation finishes (handled in tick()). For now leave it at
      // the drained-to-zero state so the panel reads 0 during the ticker.
      G.bonus = 0;
      // Edge case: if no bonus was earned, the ticker won't run so we need
      // to set the next level's bonus directly.
      if (!G.tickerActive) {
        G.bonus = Math.min(1000, G.level * 100);
        G.displayBonus = G.bonus;
        G.bonusTimer = 0;
      }
      G.state = 'play';
    } else {
      G.lives -= 1;
      G.flash = 1; G.flashColor = '#ff5040';
      if (G.lives <= 0) {
        updateHud();
        G.state = 'gameover';
        return;
      }
      G.ballX = W / 2;
      G.ballVx = 0;
      G.prevBallX = G.ballX;
      G.prevBallSurfY = G.leftY;
      G.fallTimer = 0;
      // Reset bonus for the next ball at the same level.
      G.bonus = Math.min(1000, G.level * 100);
      G.displayBonus = G.bonus;
      G.bonusTimer = 0;
      G.state = 'play';
    }
    updateHud();
  }

  // ---------- Render ----------
  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawPlayfieldTexture();

    // Clip everything drawn on the playfield (holes, bar, ball) to the
    // wood rectangle so nothing extends past the frame.
    const woodLeft = (W - WOOD_W) / 2;
    ctx.save();
    ctx.beginPath();
    ctx.rect(woodLeft, 0, WOOD_W, WOOD_H);
    ctx.clip();

    for (let i = 0; i < G.holes.length; i++) {
      if (i === G.targetIdx) continue;
      drawHole(G.holes[i], false, i);
    }
    if (G.holes[G.targetIdx]) {
      drawHole(G.holes[G.targetIdx], true, G.targetIdx);
    }

    drawScorePanels();

    drawBar();

    if (G.state === 'play') {
      drawBallOnBar();
    } else if (G.state === 'falling' && G.pickupPhase === 'rise') {
      // After "picking up" the ball, render it on top of the bar as the
      // bar rises back into view.
      drawBallOnBar();
    }
    // During 'descend' and 'collect' phases the ball is hidden behind the board.

    ctx.restore();  // close playfield clip

    if (G.flash > 0) {
      ctx.save();
      ctx.fillStyle = G.flashColor;
      ctx.globalAlpha = G.flash * 0.18;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      G.flash = Math.max(0, G.flash - 0.04);
    }

    // Bezel/frame overlay — drawn last so it sits on top of everything.
    drawOverlayFrame();
  }

  function drawOverlayFrame() {
    // The cabinet's plastic texture shows through everywhere outside the
    // wood (since playfield-wrap is transparent and the canvas is cleared
    // each frame). Nothing to draw on the canvas itself for the bezel.
  }

  function drawPlayfieldTexture() {
    if (!woodImageReady) return;
    // Wood is always WOOD_W × WOOD_H, centered. The black frame fills
    // whatever space remains around it.
    const woodX = (W - WOOD_W) / 2;
    const woodY = 0;  // wood anchored to top of canvas
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(woodImage, woodX, woodY, WOOD_W, WOOD_H);
    // Subtle vignette/gradient overlay to add depth at top and bottom edges.
    const grad = ctx.createLinearGradient(0, woodY, 0, woodY + WOOD_H);
    grad.addColorStop(0,    'rgba(0,0,0,0.18)');
    grad.addColorStop(0.25, 'rgba(0,0,0,0)');
    grad.addColorStop(0.75, 'rgba(0,0,0,0)');
    grad.addColorStop(1,    'rgba(0,0,0,0.28)');
    ctx.fillStyle = grad;
    ctx.fillRect(woodX, woodY, WOOD_W, WOOD_H);

    // Inner shadow along all 4 edges of the wood — gives the impression
    // that the playfield is recessed about an inch beneath the frame.
    // Shadow is deeper at the top, shorter at the bottom.
    const sideDepth = 17;
    const topDepth = 31;
    const bottomDepth = 7;
    // Top edge — deep, more shadow up here.
    const topGrad = ctx.createLinearGradient(0, woodY, 0, woodY + topDepth);
    topGrad.addColorStop(0, 'rgba(0,0,0,0.55)');
    topGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = topGrad;
    ctx.fillRect(woodX, woodY, WOOD_W, topDepth);
    // Bottom edge — short, just a hint.
    const botGrad = ctx.createLinearGradient(0, woodY + WOOD_H - bottomDepth, 0, woodY + WOOD_H);
    botGrad.addColorStop(0, 'rgba(0,0,0,0)');
    botGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = botGrad;
    ctx.fillRect(woodX, woodY + WOOD_H - bottomDepth, WOOD_W, bottomDepth);
    // Left edge.
    const leftGrad = ctx.createLinearGradient(woodX, 0, woodX + sideDepth, 0);
    leftGrad.addColorStop(0, 'rgba(0,0,0,0.4)');
    leftGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = leftGrad;
    ctx.fillRect(woodX, woodY, sideDepth, WOOD_H);
    // Right edge.
    const rightGrad = ctx.createLinearGradient(woodX + WOOD_W - sideDepth, 0, woodX + WOOD_W, 0);
    rightGrad.addColorStop(0, 'rgba(0,0,0,0)');
    rightGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = rightGrad;
    ctx.fillRect(woodX + WOOD_W - sideDepth, woodY, sideDepth, WOOD_H);

    ctx.restore();
  }

  function drawHole(hole, isTarget, index) {
    const x = hole.x, y = hole.y, r = hole.radius;

    // Subtle outer highlight ring — gives the hole a sense of depth, as if
    // light is catching the lip of the recessed opening.
    ctx.beginPath();
    ctx.arc(x, y, r + 1.5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    const grd = ctx.createRadialGradient(x, y - 2, 1, x, y, r);
    grd.addColorStop(0,   '#000000');
    grd.addColorStop(0.7, '#0a0604');
    grd.addColorStop(1,   '#1a0a04');
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Score holes get a black ring around them with a small gap at the top
    // where the score hole's number (1-10) is displayed. They also get a
    // pulsing gold dot in the center of the hole as a visual marker.
    if (hole.type === 'score') {
      const ringRadius = r + 5;        // distance of ring from hole center
      const gapAngleDeg = 50;          // angular size of the top gap
      const gapHalf = (gapAngleDeg / 2) * Math.PI / 180;
      // The ring is an arc that goes all the way around EXCEPT for the gap
      // at the top. The top is at angle = -PI/2 (straight up). So we draw
      // from (gapHalf - PI/2) clockwise around to (-gapHalf - PI/2).
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, ringRadius, -Math.PI / 2 + gapHalf, -Math.PI / 2 - gapHalf, false);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.6;
      ctx.stroke();
      // Number in the gap (above the hole, centered).
      ctx.font = '700 11px "Sohne Schmal", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000';
      ctx.fillText(String(hole.typeIndex), x, y - ringRadius - 1);
      // Pulsing yellow light in the center of the hole.
      const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 240);
      const dotR = r * 0.62;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 206, 0, ' + (0.95 * pulse) + ')';
      ctx.fill();
      // Blurred white glare in the upper-right to suggest a glossy reflection.
      const glareX = x + dotR * 0.35;
      const glareY = y - dotR * 0.35;
      const glareR = dotR * 0.55;
      const glareGrad = ctx.createRadialGradient(glareX, glareY, 0, glareX, glareY, glareR);
      glareGrad.addColorStop(0, 'rgba(255, 255, 255, 0.85)');
      glareGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.25)');
      glareGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = glareGrad;
      ctx.beginPath();
      ctx.arc(glareX, glareY, glareR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Hole index label — numbered per type. Score holes don't get labels
    // because they have the glow indicator instead.
    if (G.showHoleNumbers && typeof hole.typeIndex === 'number' && hole.type !== 'score') {
      // Detect if another hole is stacked just above this one (same x area,
      // close y above) — if so, render this label BELOW the hole so the
      // labels don't overlap.
      let labelBelow = false;
      for (const other of G.holes) {
        if (other === hole) continue;
        if (Math.abs(other.x - hole.x) < 12 && other.y < hole.y && (hole.y - other.y) < 30) {
          labelBelow = true;
          break;
        }
      }
      const labelY = labelBelow ? (y + r + 8) : (y - r - 8);

      ctx.save();
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Faint dark backdrop for legibility.
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillText(String(hole.typeIndex), x + 1, labelY + 1);
      // Color by type: red for large, gold for medium.
      ctx.fillStyle = (hole.type === 'large') ? '#ff4040' : '#ffd28a';
      ctx.fillText(String(hole.typeIndex), x, labelY);
      ctx.restore();
    }
  }

  function drawBar() {
    const woodLeft = (W - WOOD_W) / 2;
    const woodRight = woodLeft + WOOD_W;
    // Brackets land 10px from the wood edges. Brackets are inset 8px along
    // the rod from lx/rx, so lx = woodLeft + 10 - 8 = woodLeft + 2.
    const lx = woodLeft + 2, rx = woodRight - 2;
    const angle = Math.atan2(G.rightY - G.leftY, rx - lx);

    // Clip everything in this function to the wood area, so the rod's
    // overhang is hidden by the frame — like the rod runs into slots in
    // the cabinet edge.
    ctx.save();
    ctx.beginPath();
    ctx.rect(woodLeft, 0, WOOD_W, WOOD_H);
    ctx.clip();

    // The rod runs the full bar length. The posts are inset FROM the rod
    // ends so the rod hangs out past each post (matching the reference).
    const dx = rx - lx, dy = G.rightY - G.leftY;
    const len = Math.hypot(dx, dy);
    const ux = dx / len, uy = dy / len;
    const postInset = 8;
    const lpx = lx + ux * postInset;
    const lpy = G.leftY + uy * postInset;
    const rpx = rx - ux * postInset;
    const rpy = G.rightY - uy * postInset;

    // Render order: bottom posts (behind rod) → rod → top posts (in front).
    drawBottomPost(lpx, lpy, angle);
    drawBottomPost(rpx, rpy, angle);

    // ----- The rod -----
    // The rod extends past the visible playfield bounds, so its ends
    // disappear behind the bezel. The posts stay at the visible edges,
    // marking where the rod appears to be anchored. This matches the
    // real arcade where the rod runs through tracks in the cabinet.
    const rodOverhang = 40;
    const rodLeftX  = lx - ux * rodOverhang;
    const rodLeftY  = G.leftY  - uy * rodOverhang;
    const rodRightX = rx + ux * rodOverhang;
    const rodRightY = G.rightY + uy * rodOverhang;

    if (rodImageReady && rodCanvas) {
      // Render the rod from a pre-rendered chrome-rod canvas, rotated to
      // match the bar's tilt angle.
      const rodLen = Math.hypot(rodRightX - rodLeftX, rodRightY - rodLeftY);
      const rodH = G.barThickness * 2;
      const rodCenterX = (rodLeftX + rodRightX) / 2;
      const rodCenterY = (rodLeftY + rodRightY) / 2;
      // Drop shadow — soft and offset well below the rod so the bar reads
      // as floating slightly above the playfield surface. Shadow is taller
      // than the rod for a more diffuse cast-shadow look.
      ctx.save();
      ctx.translate(rodCenterX, rodCenterY + 16);
      ctx.rotate(angle);
      ctx.filter = 'blur(8px)';
      ctx.fillStyle = 'rgba(0,0,0,0.32)';
      ctx.fillRect(-rodLen / 2, -rodH, rodLen, rodH * 2);
      ctx.restore();
      // Rod — use highest-quality smoothing for clean edges at any angle.
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.translate(rodCenterX, rodCenterY);
      ctx.rotate(angle);
      ctx.drawImage(rodCanvas, -rodLen / 2, -rodH / 2, rodLen, rodH);
      ctx.restore();
    } else {
      // Fallback: drawn rod (used until image loads).
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(rodLeftX, rodLeftY + 3);
      ctx.lineTo(rodRightX, rodRightY + 3);
      ctx.lineWidth = G.barThickness;
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineCap = 'round';
      ctx.filter = 'blur(2px)';
      ctx.stroke();
      ctx.restore();

      ctx.beginPath();
      ctx.moveTo(rodLeftX, rodLeftY);
      ctx.lineTo(rodRightX, rodRightY);
      ctx.lineWidth = G.barThickness + 1;
      ctx.strokeStyle = '#3a3a3a';
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(rodLeftX, rodLeftY);
      ctx.lineTo(rodRightX, rodRightY);
      ctx.lineWidth = G.barThickness;
      ctx.strokeStyle = '#cfcfcf';
      ctx.lineCap = 'round';
      ctx.stroke();

      const ox = Math.sin(angle) * 0.5;
      const oy = -Math.cos(angle) * 0.5;
      ctx.beginPath();
      ctx.moveTo(rodLeftX + ox, rodLeftY  + oy);
      ctx.lineTo(rodRightX + ox, rodRightY + oy);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Top posts go on top of the rod.
    drawTopPost(lpx, lpy, angle);
    drawTopPost(rpx, rpy, angle);

    ctx.restore();  // close the wood-rectangle clip
  }

  // The TOP post: sits in front of the rod, extends upward from rod's
  // centerline. Its bottom is rounded, so it appears to enter the rod.
  // The TOP post: sits in front of the rod, extends upward (perpendicular
  // to the rod) from rod's centerline. Uses the bracket image (chrome cylinder
  // with rounded top, flat-shadow bottom).
  function drawTopPost(x, y, angle) {
    const w = 7;             // rendered width
    const h = w * 3;         // 1:3 aspect ratio matching source image
    // Anchor: post's bottom sits 33% into the rod thickness from top.
    const postBottom = -G.barThickness / 2 + G.barThickness * 0.33;
    const top = postBottom - h;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    if (bracketImageReady && bracketCanvas) {
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(bracketCanvas, -w / 2, top, w, h);
    } else {
      // Fallback: drawn post.
      const r = Math.min(w, h) / 2;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundedRectPath(ctx, -w / 2 + 1, top + 2, w, h, r);
      ctx.fill();
      const g = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
      g.addColorStop(0, '#4a4a4a');
      g.addColorStop(0.5, '#f4f4f4');
      g.addColorStop(1, '#3a3a3a');
      ctx.fillStyle = g;
      roundedRectPath(ctx, -w / 2, top, w, h, r);
      ctx.fill();
    }

    ctx.restore();
  }

  // The BOTTOM post: sits behind the rod, extends downward (perpendicular
  // to the rod). Uses the bottom bracket image which has the flat-shadow
  // edge at the top (toward the rod) and the rounded end at the bottom.
  function drawBottomPost(x, y, angle) {
    const w = 7;
    const h = w * (203 / 127);  // preserve image aspect ratio
    // Anchor: post's top sits 33% into the rod thickness from bottom (i.e.
    // a bit past the rod's centerline) so it overlaps the rod slightly.
    const postTop = G.barThickness / 2 - G.barThickness * 0.33;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    if (bracketBottomImageReady && bracketBottomCanvas) {
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(bracketBottomCanvas, -w / 2, postTop, w, h);
    } else {
      const r = w / 2;
      const g = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
      g.addColorStop(0, '#3a3a3a');
      g.addColorStop(0.5, '#d4d4d4');
      g.addColorStop(1, '#2a2a2a');
      ctx.fillStyle = g;
      roundedRectPath(ctx, -w / 2, postTop, w, h, r);
      ctx.fill();
    }

    ctx.restore();
  }

  // Score panels live in the DOM (#logo-area). Update them each frame.
  const panelEl = {
    score: document.getElementById('score-value'),
    bonus: document.getElementById('bonus-value'),
    balls: [
      document.getElementById('ball0'),
      document.getElementById('ball1'),
      document.getElementById('ball2'),
    ],
  };
  let lastScore = -1, lastBonus = -1, lastLives = -1;
  function drawScorePanels() {
    const score = Math.floor(G.displayScore);
    const bonus = Math.floor(G.displayBonus);
    if (score !== lastScore) {
      panelEl.score.textContent = String(score);
      // Ghost shows the same number of digits as the value so they align.
      panelEl.score.setAttribute('data-ghost', '8'.repeat(String(score).length));
      lastScore = score;
    }
    if (bonus !== lastBonus) {
      panelEl.bonus.textContent = String(bonus);
      panelEl.bonus.setAttribute('data-ghost', '8'.repeat(String(bonus).length));
      lastBonus = bonus;
    }
    if (G.lives !== lastLives) {
      for (let b = 0; b < 3; b++) {
        panelEl.balls[b].classList.toggle('filled', b < G.lives);
      }
      lastLives = G.lives;
    }
  }

  function roundedRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function drawBallOnBar() {
    const woodLeft = (W - WOOD_W) / 2;
    const woodRight = woodLeft + WOOD_W;
    // Brackets land 10px from the wood edges. Brackets are inset 8px along
    // the rod from lx/rx, so lx = woodLeft + 10 - 8 = woodLeft + 2.
    const lx = woodLeft + 2, rx = woodRight - 2;
    const dx = rx - lx;
    const dy = G.rightY - G.leftY;
    const len = Math.hypot(dx, dy);

    // Where on the rod's centerline is the ball horizontally?
    const t = (G.ballX - lx) / dx;
    const tc = Math.max(0, Math.min(1, t));
    const rodCenterY = G.leftY + tc * dy;

    // The rod's "up" direction (perpendicular to its axis, pointing up).
    // For a rod going from (lx, leftY) to (rx, rightY), the unit-normal
    // pointing up-and-perpendicular is (-dy/len, dx/len) but flipped if dx
    // is negative. Since dx > 0 here, up = (-dy/len, dx/len) which points
    // upward when rod tilts right-down (positive dy).
    // Wait: in screen coords, "up" is negative y. The perpendicular to
    // (dx, dy) pointing toward smaller y (upward visually) is (dy, -dx)/len.
    const nx = dy / len;
    const ny = -dx / len;

    // Ball center sits offset from rod's top surface by ballRadius along
    // the perpendicular direction. The rod's visible top surface is at
    // distance barThickness from centerline (rod is rendered 2x thick).
    const offset = G.ballRadius + G.barThickness;
    const cx = G.ballX + nx * offset;
    const cy = rodCenterY + ny * offset;
    drawBall(cx, cy);
  }

  function drawBall(x, y) {
    const r = G.ballRadius;
    if (ballImageReady) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(ballImage, x - r, y - r, r * 2, r * 2);
      ctx.restore();
      return;
    }
    // Fallback gradient render.
    const g = ctx.createRadialGradient(x - 3, y - 3, 1, x, y, r);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(0.3, '#dadada');
    g.addColorStop(0.8, '#7a7a7a');
    g.addColorStop(1,   '#3a3a3a');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - 3, y - 3, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();
  }

  resize();
  generateHoles();
  G.targetIdx = pickTargetForLevel(G.level);
  resetBar();
  requestAnimationFrame(tick);
})();
